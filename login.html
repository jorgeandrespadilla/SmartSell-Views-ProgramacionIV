<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - SmartSell</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <!-- CSS only -->
    <link href="bootstrap/bootstrap.min.css" rel="stylesheet">
    <style>
        .light-background {
            background-color: #f5f5f5;
        }
    </style>
</head>

<body>
    <div class="d-flex justify-content-center align-items-center w-100 min-vh-100 light-background p-4">
        <div class="col-12 col-md-8 col-lg-5 d-grid gap-2 p-4 my-4 mx-auto card">
            <div class="d-flex align-items-center flex-column">
                <img width="72" height="72" src="assets/logo.png" />
                <h2 class="py-3">Inicio de Sesión</h2>
            </div>
            <form>
                <div class="mb-3">
                    <label for="exampleInputEmail" class="form-label">Correo electrónico</label>
                    <input type="email" class="form-control" id="exampleInputEmail" aria-describedby="emailHelp">
                </div>
                <div class="mb-3">
                    <label for="exampleInputPassword1" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="exampleInputPassword">
                </div>
                <div class="d-flex justify-content-center pt-3">
                    <button type="submit" class="btn btn-lg btn-primary w-100">Ingresar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- JavaScript Bundle with Popper -->
    <script src="bootstrap/bootstrap.bundle.min.js"></script>
</body>

</html>
