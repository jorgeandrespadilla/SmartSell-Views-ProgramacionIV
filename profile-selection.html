<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selección de Perfil - SmartSell</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <!-- CSS only -->
    <link href="bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }

        .container {
            background: rgb(216, 238, 252);
            background: linear-gradient(7deg,
                    rgb(224, 243, 255) rgba(228, 242, 253, 1) 51%,
                    rgb(245, 249, 253) 100%);
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            justify-content: center;
            align-items: center;
        }

        .main-logo {
            width: 90%;
        }

        .portal-selection {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4rem;
            height: 100vh;
            background-color: white;
            padding-bottom: 15vh;
        }

        h1 {
            color: #46b1db;
        }

        .options-container {
            display: flex;
            /*gap: 2rem;*/
            justify-content: center;
            align-items: center;
        }

        a {
            text-decoration: none;
        }

        .option {
            transform: scale(1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px #c8c8c8 solid;
            border-radius: 20px;
            width: 13rem;
            height: 13rem;
            transition: transform 0.2s ease-in-out;
        }

        .option:hover {
            transform: scale(1.05);
            /* border: 2px #a5a4a4 solid; */
            background: rgba(14, 14, 14, 0.01);
        }

        .fs-xl {
            font-size: 4rem;
        }

        .option>.round-container {
            padding: 1rem;
            border-radius: 50%;
            background-color: #88c4ec69;
        }

        .option-item+.option-item {
            margin-left: 2rem;
        }

        .option>label {
            margin-top: 0.8rem;
            cursor: inherit;
            font-weight: 700;
            color: #333;
        }

        @media screen and (max-width: 1000px) {
            .main-logo {
                width: 96%;
            }
        }

        @media screen and (max-width: 780px) {
            .main-logo {
                display: none;
            }

            .portal-selection {
                grid-column-start: 1;
                grid-column-end: 3;
            }
        }
    </style>
</head>

<body>
    <div class="d-flex justify-content-center align-items-center w-100 min-vh-100 flex-column">
        <h2 class="pb-5">Seleccione su perfil</h2>
        <div class="options-container">
            <div class="option-item">
                <a href="#">
                    <div class="option">
                        <div class="round-container">
                            <span class="material-icons fs-xl">shopping_cart</span>
                        </div>
                        <label class="fs-5">Comprador</label>
                    </div>
                </a>
            </div>
            <div class="option-item">
                <a href="#">
                    <div class="option">
                        <div class="round-container">
                            <span class="material-icons fs-xl">storefront</span>
                        </div>
                        <label class="fs-5">Vendedor</label>
                    </div>
                </a>
            </div>
        </div>
    </div>
    <!-- JavaScript Bundle with Popper -->
    <script src="bootstrap/bootstrap.bundle.min.js"></script>
</body>

</html>
